name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # macOS x86_64 (Intel) 빌드는 macos-latest runner에서 bundle_dmg.sh가 일관적으로
          # 실패하므로 제거. Intel Mac 사용자는 Rosetta로 arm64 dmg를 실행하거나 source에서 빌드.
          - platform: ubuntu-22.04
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Codex Session Manager ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](./CHANGELOG.md) for details. Installers attached below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Mark draft release ready
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            // 같은 tag의 draft 우선, 없으면 이미 published된 것도 받아들임 (idempotent)
            const draft = releases.find(r => r.tag_name === tag && r.draft);
            const published = releases.find(r => r.tag_name === tag && !r.draft);
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
              });
              core.info(`Published release ${draft.id} for tag ${tag}`);
            } else if (published) {
              core.info(`Release for tag ${tag} is already published (id=${published.id}). Nothing to do.`);
            } else {
              throw new Error(`No release (draft or published) found for tag ${tag}`);
            }
